<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formular</title>
    <link rel="stylesheet" href="formular.css" />
    <script src="formular.js"></script>
    <style>

    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<header>
    <h1>IT-Service-Krems</h1>
</header>

<body>
    <div class="formular-box">

        <form id="personalData">

            <p class="überschrift" style="font-size: 50px; text-decoration:underline; font-weight:bold; ">
                Bewerbungsformular</p>

            <p>
                <label for="firstname">Vorname:</label>
                <input type="text" id="firstname" name="firstname" required />
            </p>

            <p>
                <label for="lastname">Nachname:</label>
                <input type="text" id="lastname" name="lastname" required>
            </p>

            <p>
                <label for="position">Position:</label>
                <input type="text" id="position" name="position" required />
            </p>

            <p>
                <label for="experience">Erfahrung (in Jahren):</label>
                <input type="text" id="experience" name="experience" required>
            </p>

            <p>
                <label class="e" for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </p>

            <p>
                <label for="telephone">Telefonnummer:</label>
                <input type="tel" id="telephone" name="telephone" required>
            </p>
            <a href="anzeigen.html">Ihre gespeicherten Daten</a>




            <p>
                <input type="submit" id="submitbutton" />
            </p>
        </form>
    </div>
</body>

</html>
